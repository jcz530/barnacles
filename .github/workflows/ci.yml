name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python (for native module builds)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npm run rebuild
        env:
          PYTHON: python3

      # Skipping type-check for now due to pre-existing frontend errors
      # - name: Run type checking
      #   run: npm run type-check

#      - name: Run linter
#        run: npm run lint

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        env:
          NODE_ENV: test
        run: xvfb-run --auto-servernum npm test -- --run

      - name: Run tests (macOS/Windows)
        if: runner.os != 'Linux'
        env:
          NODE_ENV: test
        run: npm test -- --run

      - name: Build project
        run: npm run build

  build-distributables:
    name: Build App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python (for native module builds)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npm run rebuild
        env:
          PYTHON: python3

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Create placeholder for missing libsql platform packages
        shell: bash
        run: |
          mkdir -p node_modules/@libsql/darwin-x64
          echo '{"name":"@libsql/darwin-x64","version":"0.0.0"}' > node_modules/@libsql/darwin-x64/package.json
          mkdir -p node_modules/@libsql/linux-x64-gnu
          echo '{"name":"@libsql/linux-x64-gnu","version":"0.0.0"}' > node_modules/@libsql/linux-x64-gnu/package.json

      - name: Build distributable (macOS)
        if: runner.os == 'macOS'
        run: npx --yes electron-builder --mac --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build distributable (Windows)
        if: runner.os == 'Windows'
        run: npx --yes electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build distributable (Linux)
        if: runner.os == 'Linux'
        run: npx --yes electron-builder --linux --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: ignore
          retention-days: 7
